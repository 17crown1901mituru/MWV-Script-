name: Build APK

on:
  push:
    branches:
      - main
  # 手動実行も可能
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ソースコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 をセットアップ（build.gradleのJVM targetと合わせる）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle キャッシュ（2回目以降のビルドを高速化）
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # gradlewに実行権限を付与
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # debug APK をビルド
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # APK をアーティファクトとしてアップロード（7日間保持）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MWV-Script-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

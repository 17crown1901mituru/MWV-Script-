name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Ensure res files
        run: mkdir -p app/src/main/res/values && test -f app/src/main/res/values/strings.xml || printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">MWV Script</string>\n    <string name="accessibility_service_description">MWV Script accessibility service</string>\n</resources>\n' > app/src/main/res/values/strings.xml

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MWV-Script-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

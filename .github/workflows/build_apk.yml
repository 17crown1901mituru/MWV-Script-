name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # drawable/ic_launcher.xml が存在しない場合に備えてPNGを生成
      - name: Generate launcher icon if missing
        run: |
          DRAWABLE_DIR="app/src/main/res/drawable"
          mkdir -p "$DRAWABLE_DIR"
          if [ ! -f "$DRAWABLE_DIR/ic_launcher.xml" ] && [ ! -f "$DRAWABLE_DIR/ic_launcher.png" ]; then
            sudo apt-get install -y imagemagick 2>/dev/null || true
            convert -size 108x108 xc:#0a0a0f \
              -fill '#7c6aff' -draw "rectangle 20,30 88,78" \
              -fill '#0a0a0f' -draw "rectangle 28,42 50,48" \
              -fill '#0a0a0f' -draw "rectangle 28,54 65,60" \
              "$DRAWABLE_DIR/ic_launcher.png" 2>/dev/null || \
            python3 -c "
          import struct, zlib
          def png_1x1(r,g,b):
              raw = bytes([0,r,g,b,255])
              compressed = zlib.compress(raw)
              chunks = b'\\x89PNG\\r\\n\\x1a\\n'
              def chunk(t,d): c=struct.pack('>I',len(d))+t+d; return c+struct.pack('>I',zlib.crc32(c[4:])&0xffffffff)
              chunks += chunk(b'IHDR', struct.pack('>IIBBBBB',1,1,8,2,0,0,0))
              chunks += chunk(b'IDAT', compressed)
              chunks += chunk(b'IEND', b'')
              return chunks
          open('$DRAWABLE_DIR/ic_launcher.png','wb').write(png_1x1(124,106,255))
          "
            echo "Generated ic_launcher.png"
          else
            echo "ic_launcher already exists, skipping"
          fi

      # Manifest の icon 参照先を drawable に統一（XMLもPNGも同じdrawableに置く）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MWV-Script-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7